<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIDS Dashboard</title>
    <link rel="stylesheet" href="{{url_for('static', filename='css/style.css')}}">
</head>
<body>
    <h1>NIDS Dashboard</h1>
    <div class="stats-grid">
        <div class="stat-card">
            <h2 id="total-flows">0</h2>
            <p>Total Flows</p>
        </div>
        <div class="stat-card benign">
            <h2 id="benign-flows">0</h2>
            <p>Benign Flows</p>
        </div>
        <div class="stat-card alerts">
            <h2 id="alert-count">0</h2>
            <p>Alerts</p>
        </div>
        <div class="stat-card threats">
            <h2 id="threat-count">0</h2>
            <p>Threat Intel Matches</p>
        </div>
    </div>

    <div class="section">
        <h2>Traffic Volume</h2>
        <div class="chart-controls">
            <button class="interval-btn active" onclick="setChartInterval('hour')">Hour</button>
            <button class="interval-btn" onclick="setChartInterval('day')">Day</button>
            <button class="interval-btn" onclick="setChartInterval('week')">Week</button>
            <button class="interval-btn" onclick="setChartInterval('month')">Month</button>
        </div>
        <canvas id="traffic-chart"></canvas>
    </div>

    <div class="section">
        <h2>Alert History</h2>
        <div id="alert-list">
            <p class="no-alerts">No alerts detected yet</p>
        </div>
    </div>

    <div id="alert-modal" class="modal hidden">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <h3 id="modal-title"></h3>
            <div id="modal-body"></div>
        </div>
    </div>
    <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <script src="{{url_for('static', filename='js/dashboard.js')}}"></script>
</body>
</html>
