<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIDS Dashboard</title>
    <link rel="stylesheet" href="{{url_for('static', filename='css/style.css')}}">
</head>
<body>
    <div class="header">
        <h1>NIDS Dashboard</h1>
        <button class="alert-btn" onclick="openAlertSettings()" title="Alerts">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-bell" viewBox="0 0 16 16">
                <path d="M8 16a2 2 0 0 0 2-2H6a2 2 0 0 0 2 2M8 1.918l-.797.161A4 4 0 0 0 4 6c0 .628-.134 2.197-.459 3.742-.16.767-.376 1.566-.663 2.258h10.244c-.287-.692-.502-1.49-.663-2.258C12.134 8.197 12 6.628 12 6a4 4 0 0 0-3.203-3.92zM14.22 12c.223.447.481.801.78 1H1c.299-.199.557-.553.78-1C2.68 10.2 3 6.88 3 6c0-2.42 1.72-4.44 4.005-4.901a1 1 0 1 1 1.99 0A5 5 0 0 1 13 6c0 .88.32 4.2 1.22 6"/>
            </svg>
        </button>
    </div>  
    <div class="stats-grid">
        <div class="stat-card">
            <h2 id="total-flows">0</h2>
            <p>Total Flows</p>
        </div>
        <div class="stat-card benign">
            <h2 id="benign-flows">0</h2>
            <p>Benign Flows</p>
        </div>
        <div class="stat-card alerts">
            <h2 id="alert-count">0</h2>
            <p>Alerts</p>
        </div>
        <div class="stat-card threats">
            <h2 id="threat-count">0</h2>
            <p>Threat Intel Matches</p>
        </div>
    </div>

    <div class="section">
        <h2>Traffic Volume</h2>
        <div class="chart-controls">
            <button class="interval-btn active" onclick="setChartInterval('hour')">Hour</button>
            <button class="interval-btn" onclick="setChartInterval('day')">Day</button>
            <button class="interval-btn" onclick="setChartInterval('week')">Week</button>
            <button class="interval-btn" onclick="setChartInterval('month')">Month</button>
        </div>
        <canvas id="traffic-chart"></canvas>
    </div>

    <div class="section">
        <h2>Alert History</h2>
        <div id="alert-list">
            <p class="no-alerts">No alerts detected yet</p>
        </div>
    </div>

    <div id="alert-modal" class="modal hidden">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">X</button>
            <h3 id="modal-title"></h3>
            <div id="modal-body"></div>
        </div>
    </div>
    <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()"></div>

    <div id="alert-settings-modal" class="modal hidden">
        <div class="modal-content">
            <button class="modal-close" onclick="closeAlertSettings()">X</button>
            <h3>Alert Settings</h3>
 
            <div class="settings-section">
                <h4>SMS Alert Subscriptions</h4>
                <p class="settings-desc">Subscribed numbers will receive SMS alerts when an attack is detected.</p>
 
                <div class="subscription-form">
                    <input type="tel" id="phone-input" placeholder="+353861234567" class="phone-input" />
                    <button class="subscribe-btn" onclick="addSubscription()">Subscribe</button>
                </div>
 
                <div id="subscription-feedback" class="subscription-feedback hidden"></div>
 
                <div id="subscription-list" class="subscription-list">
                    <p class="no-alerts">Loading...</p>
                </div>
            </div>
        </div>
    </div>
    <div id="settings-overlay" class="modal-overlay hidden" onclick="closeAlertSettings()"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <script src="{{url_for('static', filename='js/dashboard.js')}}"></script>
</body>
</html>
